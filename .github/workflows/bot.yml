name: OnePiecePings Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state file
        uses: actions/cache@v4
        with:
          path: state.json
          key: bot-state
          restore-keys: |
            bot-state

      - name: Run bot
        env:
          CREW_WEBHOOK: ${{ secrets.CREW_WEBHOOK }}
          FREE_WEBHOOK: ${{ secrets.FREE_WEBHOOK }}
        run: python bot.py

      - name: Save state file
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: bot-state
